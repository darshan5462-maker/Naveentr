<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naveen T R — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ece4;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  .page {
    width: 794px;
    background: #fff;
    box-shadow: 0 8px 48px rgba(0,0,0,0.12);
    display: flex;
    min-height: 1100px;
  }

  /* LEFT SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #1a1a2e;
    color: #fff;
    padding: 44px 28px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8a045, #c8612a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    border: 3px solid rgba(255,255,255,0.18);
  }

  .name-block { text-align: center; }

  .name-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    letter-spacing: 0.3px;
  }

  .name-block .title-tag {
    margin-top: 7px;
    display: inline-block;
    background: rgba(232, 160, 69, 0.2);
    color: #e8a045;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(232, 160, 69, 0.35);
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e8a045;
    margin-bottom: 14px;
  }

  /* Contact */
  .contact-list { display: flex; flex-direction: column; gap: 10px; }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.8);
    line-height: 1.4;
  }
  .contact-icon {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .contact-icon svg { width: 14px; height: 14px; fill: #e8a045; }

  /* Skills */
  .skill-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .skill-tag {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    font-size: 11.5px;
    font-weight: 400;
    padding: 5px 10px;
    border-radius: 5px;
    line-height: 1;
  }

  /* Languages */
  .lang-list { display: flex; flex-direction: column; gap: 10px; }
  .lang-item { }
  .lang-name {
    font-size: 12.5px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .lang-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .lang-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #e8a045, #c8612a); }

  /* Personal */
  .personal-list { display: flex; flex-direction: column; gap: 9px; }
  .personal-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }
  .personal-label { color: rgba(255,255,255,0.45); font-weight: 400; }
  .personal-value { color: rgba(255,255,255,0.82); font-weight: 500; text-align: right; }

  /* RIGHT MAIN */
  .main {
    flex: 1;
    padding: 44px 36px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .main-section { }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .section-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .section-icon svg { width: 16px; height: 16px; fill: #e8a045; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: 0.2px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: #e8e3d8;
  }

  /* Objective */
  .objective-text {
    font-size: 13.5px;
    color: #555;
    line-height: 1.75;
    padding: 16px 18px;
    background: #faf8f4;
    border-left: 3px solid #e8a045;
    border-radius: 0 6px 6px 0;
  }

  /* Education */
  .edu-card {
    display: flex;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid #ede9e0;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .edu-card:last-child { margin-bottom: 0; }

  .edu-year-badge {
    min-width: 52px;
    text-align: center;
    padding-top: 2px;
  }

  .edu-year-badge .year {
    font-size: 11px;
    font-weight: 600;
    color: #c8612a;
    background: rgba(232,160,69,0.12);
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .edu-info { flex: 1; }

  .edu-degree {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 3px;
  }

  .edu-board {
    font-size: 12.5px;
    color: #888;
    margin-bottom: 6px;
  }

  .edu-pct {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #1a6b3a;
    background: rgba(26,107,58,0.1);
    padding: 2px 10px;
    border-radius: 4px;
  }

  .edu-pursuing {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #c8612a;
    background: rgba(200,97,42,0.1);
    padding: 2px 10px;
    border-radius: 4px;
  }

  /* Declaration */
  .declaration-box {
    background: #faf8f4;
    border: 1px solid #ede9e0;
    border-radius: 8px;
    padding: 16px 18px;
  }

  .declaration-text {
    font-size: 12.5px;
    color: #666;
    line-height: 1.65;
    font-style: italic;
    margin-bottom: 16px;
  }

  .signature {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .sig-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: #1a1a2e;
    font-style: italic;
    border-bottom: 1.5px solid #1a1a2e;
    padding-bottom: 2px;
  }

  .sig-place {
    font-size: 11.5px;
    color: #aaa;
    text-align: right;
  }

  /* Highlight strip at top */
  .top-strip {
    display: flex;
    gap: 0;
    margin-bottom: -32px;
  }

  .strip-item {
    flex: 1;
    padding: 10px 14px;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .strip-item:nth-child(2) { background: #c8612a; }
  .strip-item:nth-child(3) { background: #e8a045; }

  .strip-label { font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; }
  .strip-value { font-size: 13px; font-weight: 600; color: #fff; }

  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; }
  }
</style>
</head>
